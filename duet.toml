[orchestration]
default_lead = "claude"
max_revisions = 1
agent_timeout_seconds = 600
max_parallel_tasks = 2
max_tasks = 6
# Agent profile: cheap | balanced | reasoning | max
# Controls Claude model (haiku/opus) and Codex model selection.
profile = "balanced"

[budgets]
run_wall_clock_seconds = 3600
max_agent_turns = 25
claude_max_usd_per_turn = 0.75
claude_max_usd_per_run = 2.0
codex_max_input_tokens = 400000
codex_max_output_tokens = 40000

[verification]
timeout_seconds = 300
setup_commands = [
  ["npm", "ci", "--ignore-scripts"],
]
commands = [
  ["npm", "test"],
  ["npm", "run", "build"],
]

[verification.env]
CI = "true"

[manager]
# Default manager voice on startup: groq | gemini | glm | openai | claude | codex.
# groq and gemini are native OpenAI-compatible identities — each is enabled when
# its API key is present (GROQ_API_KEY / GEMINI_API_KEY). These defaults favor
# low-cost structured tool calls; env vars still override them.
# The dashboard can switch between configured manager providers per conversation.
provider = "groq"
groq_model = "openai/gpt-oss-120b"
groq_base_url = "https://api.groq.com/openai/v1"
gemini_model = "gemini-3.1-flash-lite"
gemini_base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
# The openai_* fields below configure ONLY the real-OpenAI identity (OPENAI_API_KEY).
# Leave openai_base_url unset for api.openai.com; Groq/Gemini no longer route here.
openai_model = "gpt-4o-mini"
# openai_base_url = "https://api.openai.com/v1"
# Per-turn and daily spend caps (USD) for OpenAI-compatible identities.
openai_max_usd_per_turn = 0.10
openai_max_usd_per_day = 2.0
# Maximum USD a single manager turn may spend via Claude.
claude_max_usd_per_turn = 0.5
# Daily Claude spend cap across all manager turns.
claude_max_usd_per_day = 5.0
# Daily Codex input token cap for manager turns.
codex_max_input_tokens_per_day = 500000
# Daily Codex output token cap for manager turns.
codex_max_output_tokens_per_day = 100000
# Wall-clock seconds a single Codex manager turn may run.
codex_runtime_seconds = 120
# Maximum manager turns per day (all interface agents combined).
max_turns_per_day = 200

# Dynamic OpenAI-compatible manager profiles. GLM is a cheap/free candidate for
# native tool-calling manager turns. Set ZAI_API_KEY (or existing ZAP_API_KEY)
# to enable this dashboard tab.
[manager.providers.glm]
label = "GLM"
api_key_env = "ZAI_API_KEY"
api_key_envs = ["ZAI_API_KEY", "ZAP_API_KEY", "ZHIPU_API_KEY"]
model_env = "GLM_MODEL"
base_url_env = "GLM_BASE_URL"
model = "glm-4.5-flash"
base_url = "https://api.z.ai/api/paas/v4"
native_tool_calling = true


# Static repo aliases — use the alias name instead of the full path in manager chat.
# Dynamic aliases created via manager proposals are stored in the database and take
# precedence over these static entries when the same name exists in both.
# [aliases]
# clicker = "C:\\Users\\nhyir\\Projects\\clicker"
# nhyira-os = "C:\\Users\\nhyir\\nhyira-os"

[service]
host = "0.0.0.0"
port = 58208

[dashboard]
persistent_access = true
# Set this only if you want a fixed LAN/public host for phone access.
public_host = "153.106.86.65"
